name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install Cordova
      run: |
        npm install -g cordova@latest --force
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'adopt'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-versions: '33'
        build-tools-version: '33.0.0'
    
    - name: Create Cordova Project
      run: |
        mkdir -p platformer-app
        cd platformer-app
        cordova create . com.example.platformer "Platformer Game"
        cd ..
    
    - name: Add Android Platform
      run: |
        cd platformer-app
        cordova platform add android --save
    
    - name: Copy Web Files
      run: |
        cd platformer-app
        cp ../index.html www/
        cp ../styles.css www/
        cp ../game.js www/
        cp ../script.js www/ || true
    
    - name: Install Cordova Plugins
      run: |
        cd platformer-app
        cordova plugin add cordova-plugin-statusbar
        cordova plugin add cordova-plugin-device
    
    - name: Build APK (Debug)
      run: |
        cd platformer-app
        cordova build android
      continue-on-error: true
    
    - name: Build APK (Release)
      run: |
        cd platformer-app
        cordova build android --release
      continue-on-error: true
    
    - name: Find and Process APK Files
      run: |
        cd platformer-app
        find platforms/android -name "*.apk" -type f || true
        # Копируем APK в корень для артефактов
        mkdir -p ../apk-output
        find platforms/android -name "*.apk" -type f -exec cp {} ../apk-output/ \; || true
        ls -la ../apk-output/ || true
    
    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: platformer-apk
        path: apk-output/
        retention-days: 30
        if-no-files-found: warn
    
    - name: Create Release on Tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: apk-output/*.apk
        body: |
          ## Platformer Game Release
          
          ### Features:
          - 🎮 Endless platformer game
          - 📱 Mobile optimized for all devices
          - 👥 Local network multiplayer
          - ⚡ Touch controls with virtual buttons
          - 🔊 Infinite platform generation
          
          ### Installation:
          1. Download the APK file from this release
          2. Enable installation from unknown sources on your Android device
          3. Open the APK file to install
          
          ### How to Play:
          - Use ◀ and ▶ buttons to move left/right
          - Press JUMP to jump
          - Avoid enemies and climb higher
          - Play solo or with friends over local network
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ APK build workflow completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts:" >> $GITHUB_STEP_SUMMARY
        echo "- APK files available in the Actions tab" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "apk-output/"*.apk ]; then
          echo "✅ APK files found and ready for download" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ APK files not generated (check build logs)" >> $GITHUB_STEP_SUMMARY
        fi

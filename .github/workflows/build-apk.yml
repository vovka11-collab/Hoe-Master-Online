name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Accept Android Licenses
      run: |
        mkdir -p $ANDROID_HOME/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131b33910" > $ANDROID_HOME/licenses/android-sdk-preview-license
    
    - name: Install Cordova CLI
      run: npm install -g cordova@12
    
    - name: Create Cordova Project
      run: cordova create platformer-game com.platformer.game "Platformer Game"
    
    - name: Add Android Platform
      working-directory: platformer-game
      run: cordova platform add android@13 --save
    
    - name: Copy Game Files
      working-directory: platformer-game
      run: |
        cp ../index.html www/
        cp ../styles.css www/
        cp ../game.js www/
    
    - name: Install Plugins
      working-directory: platformer-game
      run: |
        cordova plugin add cordova-plugin-statusbar
        cordova plugin add cordova-plugin-device
    
    - name: Build Debug APK
      working-directory: platformer-game
      run: cordova build android --debug 2>&1 | tee build-debug.log
    
    - name: Build Release APK
      working-directory: platformer-game
      run: cordova build android --release 2>&1 | tee build-release.log
    
    - name: Find APK Files
      run: |
        mkdir -p apk-artifacts
        find platformer-game -name "*.apk" -type f -exec cp {} apk-artifacts/ \; 2>/dev/null || true
        ls -lah apk-artifacts/ || echo "No APK files generated"
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: platformer-apk
        path: apk-artifacts/
        retention-days: 30
        if-no-files-found: warn
    
    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: platformer-game/build-*.log
        retention-days: 7
    
    - name: Create Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: apk-artifacts/*.apk
        body: |
          # 🎮 Platformer Game Release
          
          ## Features:
          - ✨ Endless platformer game
          - 📱 Mobile optimized
          - ⚡ Touch controls
          - 👾 Enemy avoidance
          
          ## Installation:
          1. Download APK
          2. Enable Unknown Sources on Android
          3. Install and enjoy!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Summary
      run: |
        echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "✅ Build completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "apk-artifacts"/*.apk ]; then
          echo "✅ APK files generated successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No APK files found (check logs)" >> $GITHUB_STEP_SUMMARY
        fi

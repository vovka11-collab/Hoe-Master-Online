name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'adopt'
    
    - name: Install Gradle
      run: |
        apt-get update
        apt-get install -y gradle
    
    - name: Install Cordova
      run: |
        npm install -g cordova@latest
    
    - name: Create Cordova App
      run: |
        cordova create platformer-game com.platformer.game "Platformer Game"
        cd platformer-game
        cordova platform add android
    
    - name: Copy Web Files
      run: |
        cd platformer-game
        cp ../index.html www/
        cp ../styles.css www/
        cp ../game.js www/
    
    - name: Build APK
      run: |
        cd platformer-game
        cordova build android --release 2>&1 | tee build.log
        echo "Build completed"
    
    - name: Check Build Output
      run: |
        find platformer-game -name "*.apk" -type f -exec ls -lh {} \;
    
    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: platformer-game/build.log
        retention-days: 7
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: platformer-apk
        path: platformer-game/platforms/android/app/build/outputs/apk/**/*.apk
        retention-days: 30
    
    - name: Build Status
      run: |
        echo "## Build Status" >> $GITHUB_STEP_SUMMARY
        echo "APK Build Completed" >> $GITHUB_STEP_SUMMARY
